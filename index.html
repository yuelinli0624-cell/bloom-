// ============================================================
// 数据加载与保存
// ============================================================
function loadData() {
    var saved = localStorage.getItem('bloom_menu_items');
    if (saved) {
        try { menuItems = JSON.parse(saved); } catch (e) { menuItems = []; }
    }
    if (!menuItems || menuItems.length === 0) {
        menuItems = JSON.parse(JSON.stringify(DEFAULT_MENU));
        localStorage.setItem('bloom_menu_items', JSON.stringify(menuItems));
    }
    var savedOrders = localStorage.getItem('bloom_orders');
    if (savedOrders) {
        try { orders = JSON.parse(savedOrders); } catch (e) { orders = []; }
    }
}

function saveMenu() {
    try { localStorage.setItem('bloom_menu_items', JSON.stringify(menuItems)); } catch (e) {}
}

function saveOrders() {
    try { localStorage.setItem('bloom_orders', JSON.stringify(orders)); } catch (e) {}
}

loadData();
// ============================================================
// 核心功能函数
// ============================================================

function setCategory(cat) {
    currentCategory = cat;
    render();
}

function switchTab(tab) {
    currentTab = tab;
    render();
}

function switchLang(lang) {
    currentLang = lang;
    render();
}

function addToCart(item) {
    for (var i = 0; i < cart.length; i++) {
        if (cart[i].id === item.id) {
            cart[i].qty += 1;
            render();
            return;
        }
    }
    cart.push({ id: item.id, name: item.name, price: item.price, qty: 1, img: item.img });
    render();
}

function removeFromCart(itemId) {
    for (var i = 0; i < cart.length; i++) {
        if (cart[i].id === itemId) {
            cart[i].qty -= 1;
            if (cart[i].qty <= 0) {
                cart.splice(i, 1);
            }
            render();
            return;
        }
    }
}

function submitOrder() {
    if (cart.length === 0) return;
    var t = getT();
    var total = 0;
    for (var i = 0; i < cart.length; i++) {
        total += cart[i].price * cart[i].qty;
    }
    var newOrder = {
        id: 'order_' + Date.now(),
        code: '#' + String(Math.floor(1000 + Math.random() * 9000)),
        items: JSON.parse(JSON.stringify(cart)),
        total: total,
        status: '已下单',
        time: new Date().toLocaleString()
    };
    orders.unshift(newOrder);
    saveOrders();
    cart = [];
    currentTab = 'orders';
    render();
    alert(t.orderSuccess);
}

function updateOrderStatus(orderId, status) {
    for (var i = 0; i < orders.length; i++) {
        if (orders[i].id === orderId) {
            orders[i].status = status;
            saveOrders();
            render();
            break;
        }
    }
}

function deleteItem(itemId) {
    var t = getT();
    if (!confirm(t.deleteConfirm)) return;
    for (var i = 0; i < menuItems.length; i++) {
        if (menuItems[i].id === itemId) {
            menuItems.splice(i, 1);
            saveMenu();
            render();
            break;
        }
    }
}

function moveItem(index, direction) {
    var newIndex = direction === 'up' ? index - 1 : index + 1;
    if (newIndex < 0 || newIndex >= menuItems.length) return;
    var temp = menuItems[index];
    menuItems[index] = menuItems[newIndex];
    menuItems[newIndex] = temp;
    saveMenu();
    render();
}

function getItemName(item) {
    if (currentLang === 'zh') return item.name_zh;
    if (currentLang === 'en') return item.name_en;
    return item.name_es;
}

function getItemDesc(item) {
    if (currentLang === 'zh') return item.desc_zh || '';
    if (currentLang === 'en') return item.desc_en || '';
    return item.desc_es || '';
}

function getCategoryName(cat) {
    var t = getT();
    var map = { '全部': t.all, '饭类': t.rice, '面类': t.noodles, '寿司': t.sushi, '小吃': t.snacks, '甜点': t.desserts, '饮品': t.drinks };
    return map[cat] || cat;
}
// ============================================================
// 添加/编辑菜品
// ============================================================
function startEdit(itemId) {
    for (var i = 0; i < menuItems.length; i++) {
        if (menuItems[i].id === itemId) {
            editingId = itemId;
            document.getElementById('edit_name_zh').value = menuItems[i].name_zh;
            document.getElementById('edit_name_en').value = menuItems[i].name_en;
            document.getElementById('edit_name_es').value = menuItems[i].name_es;
            document.getElementById('edit_price').value = menuItems[i].price;
            document.getElementById('edit_category').value = menuItems[i].category;
            document.getElementById('edit_desc_zh').value = menuItems[i].desc_zh || '';
            document.getElementById('edit_desc_en').value = menuItems[i].desc_en || '';
            document.getElementById('edit_desc_es').value = menuItems[i].desc_es || '';
            document.getElementById('edit_img').value = menuItems[i].img || '';
            render();
            break;
        }
    }
}

function cancelEdit() {
    editingId = null;
    document.getElementById('edit_name_zh').value = '';
    document.getElementById('edit_name_en').value = '';
    document.getElementById('edit_name_es').value = '';
    document.getElementById('edit_price').value = '';
    document.getElementById('edit_category').value = '饭类';
    document.getElementById('edit_desc_zh').value = '';
    document.getElementById('edit_desc_en').value = '';
    document.getElementById('edit_desc_es').value = '';
    document.getElementById('edit_img').value = '';
    render();
}

function saveItem() {
    var t = getT();
    var name_zh = document.getElementById('edit_name_zh').value.trim();
    var name_en = document.getElementById('edit_name_en').value.trim();
    var name_es = document.getElementById('edit_name_es').value.trim();
    var price = parseFloat(document.getElementById('edit_price').value);
    var category = document.getElementById('edit_category').value;
    var desc_zh = document.getElementById('edit_desc_zh').value.trim();
    var desc_en = document.getElementById('edit_desc_en').value.trim();
    var desc_es = document.getElementById('edit_desc_es').value.trim();
    var img = document.getElementById('edit_img').value.trim() || FOOD_TEMPLATES[0];

    if (!name_zh || !name_en || !name_es || !price) {
        alert('请填写完整的三语名称和价格');
        return;
    }

    if (editingId) {
        for (var i = 0; i < menuItems.length; i++) {
            if (menuItems[i].id === editingId) {
                menuItems[i].name_zh = name_zh;
                menuItems[i].name_en = name_en;
                menuItems[i].name_es = name_es;
                menuItems[i].price = price;
                menuItems[i].category = category;
                menuItems[i].desc_zh = desc_zh || '美味推荐';
                menuItems[i].desc_en = desc_en || 'Delicious';
                menuItems[i].desc_es = desc_es || 'Delicioso';
                menuItems[i].img = img;
                break;
            }
        }
        editingId = null;
    } else {
        var newId = 'dish_' + Date.now();
        menuItems.push({
            id: newId,
            name_zh: name_zh,
            name_en: name_en,
            name_es: name_es,
            price: price,
            category: category,
            desc_zh: desc_zh || '美味推荐',
            desc_en: desc_en || 'Delicious',
            desc_es: desc_es || 'Delicioso',
            img: img
        });
    }

    saveMenu();
    document.getElementById('edit_name_zh').value = '';
    document.getElementById('edit_name_en').value = '';
    document.getElementById('edit_name_es').value = '';
    document.getElementById('edit_price').value = '';
    document.getElementById('edit_category').value = '饭类';
    document.getElementById('edit_desc_zh').value = '';
    document.getElementById('edit_desc_en').value = '';
    document.getElementById('edit_desc_es').value = '';
    document.getElementById('edit_img').value = '';
    render();
    alert(t.saveSuccess);
}

function adminLogin() {
    var t = getT();
    var pwd = document.getElementById('admin_pwd').value;
    if (pwd === '761025') {
        isAdmin = true;
        render();
        alert(t.loginSuccess);
    } else {
        alert(t.wrongPwd);
    }
}

function adminLogout() {
    isAdmin = false;
    render();
}
// ============================================================
// 渲染函数
// ============================================================
function render() {
    var t = getT();
    var html = '';
    html += '<div class="min-h-screen bg-[#fcf9f5] text-stone-800 font-sans">';

    // ----- Header -----
    html += '<header class="sticky top-0 z-40 bg-white/95 backdrop-blur-md border-b border-[#ebdcd0] shadow-sm">';
    html += '<div class="max-w-4xl mx-auto px-4 py-3 flex items-center justify-between">';
    html += '<div class="flex items-center gap-2"><span class="text-2xl font-extrabold text-[#8c7355]">' + t.title + '</span><span class="text-xs text-[#a68c6d]">' + t.subtitle + '</span></div>';
    html += '<div class="flex items-center gap-2">';
    // 语言切换
    html += '<div class="flex bg-[#f5ebe2] p-0.5 rounded-lg">';
    var langs = [['zh', '中'], ['en', 'EN'], ['es', 'ES']];
    for (var li = 0; li < langs.length; li++) {
        var l = langs[li];
        var activeClass = currentLang === l[0] ? 'bg-[#8c7355] text-white' : 'text-stone-600';
        html += '<button onclick="switchLang(\'' + l[0] + '\')" class="px-2 py-1 text-[10px] font-bold rounded-md ' + activeClass + '">' + l[1] + '</button>';
    }
    html += '</div>';
    if (currentTab === 'admin') {
        html += '<button onclick="switchTab(\'menu\')" class="text-[10px] font-bold px-3 py-1.5 rounded-lg border border-[#c5a880] text-[#8c7355]">' + t.back + '</button>';
    } else {
        html += '<button onclick="switchTab(\'admin\')" class="text-[10px] font-bold px-3 py-1.5 rounded-lg border border-[#c5a880] text-[#8c7355]">' + t.admin + '</button>';
    }
    html += '</div></div></header>';

    html += '<div class="max-w-4xl mx-auto px-4 py-4 pb-32">';

    // ============================================================
    // 管理后台
    // ============================================================
    if (currentTab === 'admin') {
        if (!isAdmin) {
            html += '<div class="max-w-md mx-auto bg-white p-6 rounded-2xl border shadow-sm mt-10">';
            html += '<div class="text-center"><span class="text-4xl">🔐</span><h3 class="text-lg font-bold">' + t.adminTitle + '</h3><p class="text-xs text-stone-500">' + t.adminDesc + '</p></div>';
            html += '<div class="mt-4"><input id="admin_pwd" type="password" placeholder="' + t.pwdPlaceholder + '" class="w-full px-4 py-2.5 rounded-xl border text-center"></div>';
            html += '<button onclick="adminLogin()" class="w-full mt-3 py-2.5 bg-[#8c7355] text-white font-bold rounded-xl">' + t.unlock + '</button>';
            html += '</div>';
        } else {
            html += '<div class="grid grid-cols-1 lg:grid-cols-3 gap-4">';
            // 左侧表单
            html += '<div class="bg-white p-4 rounded-xl border shadow-sm">';
            html += '<h3 class="font-bold text-sm pb-2 border-b">' + (editingId ? '✏️ ' + t.editDish : '➕ ' + t.addDish) + '</h3>';
            if (editingId) {
                html += '<button onclick="cancelEdit()" class="text-[10px] text-[#8c7355] mb-2">' + t.cancelEdit + '</button>';
            }
            html += '<div class="space-y-2 mt-2">';
            html += '<input id="edit_name_zh" type="text" placeholder="中文名 *" class="w-full px-3 py-2 rounded-lg border text-sm">';
            html += '<input id="edit_name_en" type="text" placeholder="英文名 *" class="w-full px-3 py-2 rounded-lg border text-sm">';
            html += '<input id="edit_name_es" type="text" placeholder="西文名 *" class="w-full px-3 py-2 rounded-lg border text-sm">';
            html += '<input id="edit_price" type="number" step="0.01" placeholder="' + t.pricePlaceholder + '" class="w-full px-3 py-2 rounded-lg border text-sm">';
            html += '<select id="edit_category" class="w-full px-3 py-2 rounded-lg border text-sm">';
            var catList = ['饭类', '面类', '寿司', '小吃', '甜点', '饮品'];
            for (var ci = 0; ci < catList.length; ci++) {
                html += '<option value="' + catList[ci] + '">' + catList[ci] + '</option>';
            }
            html += '</select>';
            html += '<input id="edit_desc_zh" type="text" placeholder="中文描述" class="w-full px-3 py-2 rounded-lg border text-sm">';
            html += '<input id="edit_desc_en" type="text" placeholder="英文描述" class="w-full px-3 py-2 rounded-lg border text-sm">';
            html += '<input id="edit_desc_es" type="text" placeholder="西文描述" class="w-full px-3 py-2 rounded-lg border text-sm">';
            html += '<input id="edit_img" type="text" placeholder="' + t.imgPlaceholder + '" class="w-full px-3 py-2 rounded-lg border text-sm">';
            html += '<button onclick="saveItem()" class="w-full py-2 bg-[#8c7355] text-white font-bold rounded-lg text-sm">' + (editingId ? t.save : t.addBtn) + '</button>';
            html += '</div></div>';

            // 右侧
            html += '<div class="lg:col-span-2 space-y-4">';
            // 订单
            html += '<div class="bg-white p-4 rounded-xl border shadow-sm">';
            html += '<h3 class="font-bold text-sm pb-2 border-b">' + t.orderManage + '</h3>';
            if (orders.length === 0) {
                html += '<div class="text-center py-6 text-stone-400 text-xs">' + t.noOrders + '</div>';
            } else {
                for (var oi = 0; oi < orders.length; oi++) {
                    var order = orders[oi];
                    var statusColor = order.status === '已送达' ? 'bg-green-100 text-green-700' : order.status === '制作中' ? 'bg-amber-100 text-amber-700' : 'bg-orange-100 text-orange-700';
                    html += '<div class="p-3 bg-[#fcf9f5] rounded-xl border mb-2">';
                    html += '<div class="flex justify-between"><span class="font-bold text-sm">' + order.code + '</span><span class="px-2 py-0.5 rounded-full text-[10px] font-bold ' + statusColor + '">' + order.status + '</span></div>';
                    for (var oi2 = 0; oi2 < order.items.length; oi2++) {
                        var it = order.items[oi2];
                        html += '<div class="flex justify-between text-xs"><span>' + it.name + ' x' + it.qty + '</span><span>$' + (it.price * it.qty).toFixed(2) + '</span></div>';
                    }
                    html += '<div class="flex justify-between border-t pt-2 mt-1"><span class="font-bold text-sm">' + t.total + ': $' + order.total.toFixed(2) + '</span>';
                    if (order.status === '已下单') {
                        html += '<button onclick="updateOrderStatus(\'' + order.id + '\',\'制作中\')" class="bg-[#8c7355] text-white px-2 py-1 rounded text-xs">' + t.status2 + '</button>';
                    } else if (order.status === '制作中') {
                        html += '<button onclick="updateOrderStatus(\'' + order.id + '\',\'已送达\')" class="bg-green-600 text-white px-2 py-1 rounded text-xs">' + t.status3 + '</button>';
                    }
                    html += '</div></div>';
                }
            }
            html += '</div>';

            // 菜品列表
            html += '<div class="bg-white p-4 rounded-xl border shadow-sm">';
            html += '<h3 class="font-bold text-sm pb-2 border-b">' + t.dishManage + '（' + menuItems.length + '道）</h3>';
            for (var mi = 0; mi < menuItems.length; mi++) {
                var item = menuItems[mi];
                html += '<div class="py-2 flex justify-between items-center border-b last:border-0">';
                html += '<div class="flex items-center gap-3"><img src="' + item.img + '" class="w-8 h-8 object-cover rounded"><span class="text-xs font-bold">' + getItemName(item) + '</span><span class="text-[10px] text-stone-400">' + item.category + '</span></div>';
                html += '<div class="flex items-center gap-1">';
                html += '<span class="font-bold text-xs">$' + item.price.toFixed(2) + '</span>';
                html += '<button onclick="moveItem(' + mi + ',\'up\')" class="text-gray-500 text-xs px-1">↑</button>';
                html += '<button onclick="moveItem(' + mi + ',\'down\')" class="text-gray-500 text-xs px-1">↓</button>';
                html += '<button onclick="startEdit(\'' + item.id + '\')" class="text-blue-600 text-xs">' + t.save + '</button>';
                html += '<button onclick="deleteItem(\'' + item.id + '\')" class="text-red-600 text-xs">删除</button>';
                html += '</div></div>';
            }
            html += '</div></div></div>';
            html += '<div class="mt-4 text-center"><button onclick="adminLogout()" class="text-xs text-red-500">退出后台</button></div>';
        }

    // ============================================================
    // 订单页
    // ============================================================
    } else if (currentTab === 'orders') {
        html += '<h2 class="text-lg font-bold mb-4">📋 ' + t.orders + '</h2>';
        if (orders.length === 0) {
            html += '<div class="text-center py-20 bg-white rounded-2xl border shadow-sm"><span class="text-6xl">🍲</span><p class="text-xs mt-3">' + t.noOrders + '</p>';
            html += '<button onclick="switchTab(\'menu\')" class="mt-4 px-6 py-2.5 bg-[#8c7355] text-white font-bold rounded-full text-xs">' + t.goOrder + '</button></div>';
        } else {
            for (var oi3 = 0; oi3 < orders.length; oi3++) {
                var order2 = orders[oi3];
                var statusColor2 = order2.status === '已送达' ? 'bg-green-100 text-green-700' : order2.status === '制作中' ? 'bg-amber-100 text-amber-700' : 'bg-orange-100 text-orange-700';
                var statusText = order2.status === '已下单' ? t.status1 : (order2.status === '制作中' ? t.status2 : t.status3);
                html += '<div class="bg-white p-4 rounded-2xl border shadow-sm mb-4">';
                html += '<div class="flex justify-between"><span class="font-bold">' + order2.code + '</span><span class="px-3 py-1 rounded-full text-xs font-bold ' + statusColor2 + '">' + statusText + '</span></div>';
                html += '<div class="text-xs text-stone-400">' + (order2.time || '') + '</div>';
                for (var oi4 = 0; oi4 < order2.items.length; oi4++) {
                    var it2 = order2.items[oi4];
                    html += '<div class="flex justify-between text-sm"><span>' + it2.name + ' x' + it2.qty + '</span><span>$' + (it2.price * it2.qty).toFixed(2) + '</span></div>';
                }
                html += '<div class="flex justify-between font-bold border-t pt-2 mt-2"><span>' + t.total + '</span><span class="text-[#8c7355]">$' + order2.total.toFixed(2) + '</span></div>';
                html += '</div>';
            }
        }
        // ============================================================
            // 菜单页
            // ============================================================
            } else {
                // Banner
                html += '<div class="rounded-2xl overflow-hidden bg-gradient-to-r from-[#b5967a] to-[#8c7355] text-white p-6 mb-4">';
                html += '<span class="bg-[#ebdcd0] text-[#5e4c36] text-[10px] px-2.5 py-1 rounded-full font-bold">' + t.today + '</span>';
                html += '<h2 class="text-2xl font-extrabold mt-2">' + t.bannerTitle + '</h2>';
                html += '<p class="text-xs text-stone-100">' + t.bannerDesc + '</p>';
                html += '</div>';

                // 分类
                html += '<div class="flex gap-2 overflow-x-auto pb-2">';
                for (var ci2 = 0; ci2 < categories.length; ci2++) {
                    var cat2 = categories[ci2];
                    var activeClass2 = currentCategory === cat2 ? 'bg-[#8c7355] text-white shadow-md' : 'bg-white text-stone-600 border';
                    html += '<button onclick="setCategory(\'' + cat2 + '\')" class="px-5 py-2.5 rounded-full font-bold text-xs whitespace-nowrap ' + activeClass2 + '">' + getCategoryName(cat2) + '</button>';
                }
                html += '</div>';

                // 菜品列表
                var filtered = currentCategory === '全部' ? menuItems : menuItems.filter(function(item) { return item.category === currentCategory; });
                if (filtered.length === 0) {
                    html += '<div class="text-center py-16 text-stone-400">' + t.empty + '</div>';
                } else {
                    for (var mi2 = 0; mi2 < filtered.length; mi2++) {
                        var item2 = filtered[mi2];
                        var qty = 0;
                        for (var ci3 = 0; ci3 < cart.length; ci3++) {
                            if (cart[ci3].id === item2.id) { qty = cart[ci3].qty; break; }
                        }
                        var itemName = getItemName(item2);
                        var itemDesc = getItemDesc(item2);
                        html += '<div class="bg-white rounded-2xl overflow-hidden border shadow-sm flex h-32 mb-3">';
                        html += '<img src="' + item2.img + '" class="w-32 h-full object-cover" onerror="this.src=\'' + FOOD_TEMPLATES[0] + '\'">';
                        html += '<div class="p-3.5 flex flex-col justify-between flex-grow">';
                        html += '<div><div class="flex justify-between items-start"><h3 class="font-bold text-sm">' + itemName + '</h3><span class="text-[10px] px-2 py-0.5 rounded-full bg-[#f5ebe2] text-[#8c7355]">' + getCategoryName(item2.category) + '</span></div>';
                        html += '<p class="text-[11px] text-stone-500">' + itemDesc + '</p></div>';
                        html += '<div class="flex justify-between items-center pt-1">';
                        html += '<span class="text-base font-extrabold text-[#8c7355]">$' + item2.price.toFixed(2) + '</span>';
                        if (qty === 0) {
                            html += '<button onclick="addToCart({id:\'' + item2.id + '\',name:\'' + itemName + '\',price:' + item2.price + ',img:\'' + item2.img + '\'})" class="bg-[#8c7355] text-white px-3 py-1.5 rounded-lg text-xs font-bold">＋ ' + t.add + '</button>';
                        } else {
                            html += '<div class="flex items-center gap-2">';
                            html += '<button onclick="removeFromCart(\'' + item2.id + '\')" class="bg-red-500 text-white w-7 h-7 rounded-full text-sm font-bold">−</button>';
                            html += '<span class="text-sm font-bold w-5 text-center">' + qty + '</span>';
                            html += '<button onclick="addToCart({id:\'' + item2.id + '\',name:\'' + itemName + '\',price:' + item2.price + ',img:\'' + item2.img + '\'})" class="bg-[#8c7355] text-white w-7 h-7 rounded-full text-sm font-bold">+</button>';
                            html += '</div>';
                        }
                        html += '</div></div></div>';
                    }
                }
            }

            html += '</div>'; // 关闭 container

            // ============================================================
            // 底部购物车（仅菜单页显示）
            // ============================================================
            if (currentTab === 'menu') {
                var cartCount = 0;
                var cartTotal = 0;
                for (var ci4 = 0; ci4 < cart.length; ci4++) {
                    cartCount += cart[ci4].qty;
                    cartTotal += cart[ci4].price * cart[ci4].qty;
                }
                if (cartCount > 0) {
                    html += '<div class="fixed bottom-16 left-0 right-0 z-30 max-w-4xl mx-auto px-4">';
                    html += '<div class="bg-stone-900 text-white rounded-full p-3 px-5 flex justify-between items-center shadow-lg">';
                    html += '<div class="flex items-center gap-3"><span>🛒</span><span class="bg-amber-600 rounded-full w-5 h-5 flex items-center justify-center text-[10px]">' + cartCount + '</span><span class="font-bold">$' + cartTotal.toFixed(2) + '</span></div>';
                    html += '<button onclick="submitOrder()" class="bg-amber-500 px-5 py-2 rounded-full text-sm font-bold">' + t.checkout + '</button>';
                    html += '</div></div>';
                }
            }

            // ============================================================
            // 底部导航
            // ============================================================
            if (currentTab !== 'admin') {
                html += '<div class="fixed bottom-0 left-0 right-0 bg-white border-t shadow-lg p-3 flex justify-around items-center max-w-4xl mx-auto z-30">';
                html += '<button onclick="switchTab(\'menu\')" class="flex flex-col items-center text-xs font-bold ' + (currentTab === 'menu' ? 'text-[#8c7355]' : 'text-stone-400') + '"><span class="text-xl">🍽️</span><span>' + t.menu + '</span></button>';
                html += '<button onclick="switchTab(\'orders\')" class="flex flex-col items-center text-xs font-bold ' + (currentTab === 'orders' ? 'text-[#8c7355]' : 'text-stone-400') + '"><span class="text-xl">📋</span><span>' + t.orders + '</span></button>';
                var qrUrl = 'https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=' + encodeURIComponent(window.location.href.split('?')[0] + '?t=' + Date.now());
                html += '<button onclick="window.open(\'' + qrUrl + '\',\'_blank\')" class="flex flex-col items-center text-xs font-bold text-[#8c7355]"><span class="text-xl">📱</span><span>' + t.qrCode + '</span></button>';
                html += '</div>';
            }

            html += '</div>'; // 关闭根 div
            document.getElementById('app').innerHTML = html;
        }

        // ============================================================
        // 启动
        // ============================================================
        render();
    </script>
</body>
</html>
