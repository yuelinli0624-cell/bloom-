<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>BLOOM 绽里 · 点餐系统</title>
    <script src="https://unpkg.com/react@18.2.0/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .scrollbar-none::-webkit-scrollbar { display: none; }
        button { cursor: pointer; }
        .animate-fade-in { animation: fade-in 0.2s ease-out; }
        @keyframes fade-in { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-[#fcf9f5]">
    <div id="root"></div>
    <script type="text/babel">
    const { useState, useEffect } = React;

const TEMPLATES = [
    'https://images.unsplash.com/photo-1512058564366-18510be2db19?w=400',
    'https://images.unsplash.com/photo-1569718212165-3a8278d5f624?w=400',
    'https://images.unsplash.com/photo-1579871494447-9811cf80d66c?w=400',
    'https://images.unsplash.com/photo-1563245372-f21724e3866d?w=400',
    'https://images.unsplash.com/photo-1551024601-bec78aea704b?w=400',
    'https://images.unsplash.com/photo-1509042239860-f550ce710b93?w=400'
];

const DEFAULT_MENU = [
    { id:'1', name_zh:'温泉蛋黑椒和牛饭', name_en:'Wagyu Rice', name_es:'Arroz Wagyu', price:18.5, category:'饭类', desc_zh:'精选澳洲和牛', desc_en:'Premium beef', desc_es:'Ternera premium', img:TEMPLATES[0] },
    { id:'2', name_zh:'招牌黑蒜油豚骨拉面', name_en:'Black Garlic Ramen', name_es:'Ramen', price:16, category:'面类', desc_zh:'浓郁猪骨汤', desc_en:'Rich broth', desc_es:'Caldo rico', img:TEMPLATES[1] },
    { id:'3', name_zh:'火炙芝士三文鱼寿司', name_en:'Aburi Salmon', name_es:'Salmón', price:12, category:'寿司', desc_zh:'火炙三文鱼', desc_en:'Torched salmon', desc_es:'Salmón flameado', img:TEMPLATES[2] },
    { id:'4', name_zh:'日式黄金章鱼烧', name_en:'Takoyaki', name_es:'Takoyaki', price:8.5, category:'亚洲小吃', desc_zh:'外脆里嫩', desc_en:'Crispy', desc_es:'Crujiente', img:TEMPLATES[3] },
    { id:'5', name_zh:'宇治抹茶大福', name_en:'Matcha Daifuku', name_es:'Daifuku', price:6, category:'甜点', desc_zh:'软糯抹茶', desc_en:'Soft matcha', desc_es:'Suave matcha', img:TEMPLATES[4] },
    { id:'6', name_zh:'白桃乌龙冷泡茶', name_en:'Peach Oolong', name_es:'Té Oolong', price:5, category:'饮品', desc_zh:'清爽冷泡', desc_en:'Cold brew', desc_es:'Té frío', img:TEMPLATES[5] }
];

const TEXTS = {
    zh: { menu:'菜单', orders:'订单', admin:'后台', back:'返回', all:'全部', rice:'饭类', noodles:'面类', sushi:'寿司', snacks:'小吃', desserts:'甜点', drinks:'饮品', add:'添加', checkout:'下单', noOrders:'暂无订单', total:'合计', ordered:'已下单', cooking:'制作中', delivered:'已送达', password:'密码', unlock:'进入', wrong:'密码错误', addDish:'新增', editDish:'编辑', nameZh:'中文名', nameEn:'英文名', nameEs:'西文名', price:'价格', category:'分类', upload:'上传图片', success:'成功', confirmDel:'删除？' },
    en: { menu:'Menu', orders:'Orders', admin:'Admin', back:'Back', all:'All', rice:'Rice', noodles:'Noodles', sushi:'Sushi', snacks:'Snacks', desserts:'Desserts', drinks:'Drinks', add:'Add', checkout:'Order', noOrders:'No orders', total:'Total', ordered:'Ordered', cooking:'Cooking', delivered:'Delivered', password:'Password', unlock:'Enter', wrong:'Wrong pw', addDish:'Add', editDish:'Edit', nameZh:'Chinese', nameEn:'English', nameEs:'Spanish', price:'Price', category:'Category', upload:'Upload', success:'OK', confirmDel:'Delete?' },
    es: { menu:'Menú', orders:'Pedidos', admin:'Admin', back:'Volver', all:'Todos', rice:'Arroz', noodles:'Fideos', sushi:'Sushi', snacks:'Snacks', desserts:'Postres', drinks:'Bebidas', add:'Agregar', checkout:'Pedir', noOrders:'Sin pedidos', total:'Total', ordered:'Recibido', cooking:'Cocinando', delivered:'Entregado', password:'Clave', unlock:'Entrar', wrong:'Clave mala', addDish:'Añadir', editDish:'Editar', nameZh:'Chino', nameEn:'Inglés', nameEs:'Español', price:'Precio', category:'Categoría', upload:'Subir', success:'OK', confirmDel:'¿Eliminar?' }
};

const App = () => {
    const [lang, setLang] = useState('zh');
    const t = TEXTS[lang];
    const [menu, setMenu] = useState([]);
    const [orders, setOrders] = useState([]);
    const [cart, setCart] = useState([]);
    const [tab, setTab] = useState('menu');
    const [category, setCategory] = useState('全部');
    const [currentOrderId, setCurrentOrderId] = useState(null);
    const [admin, setAdmin] = useState(false);
    const [pwd, setPwd] = useState('');
    const [pwdErr, setPwdErr] = useState('');
    const [editing, setEditing] = useState(null);
    const [form, setForm] = useState({ name_zh:'', name_en:'', name_es:'', price:'', category:'饭类', desc_zh:'', desc_en:'', desc_es:'', img:'' });
    const [msg, setMsg] = useState(null);

    useEffect(() => {
        const savedMenu = localStorage.getItem('bloom_menu');
        if (savedMenu) setMenu(JSON.parse(savedMenu));
        else { setMenu(DEFAULT_MENU); localStorage.setItem('bloom_menu', JSON.stringify(DEFAULT_MENU)); }
        const savedOrders = localStorage.getItem('bloom_orders');
        if (savedOrders) setOrders(JSON.parse(savedOrders));
    }, []);

    useEffect(() => { if(menu.length) localStorage.setItem('bloom_menu', JSON.stringify(menu)); }, [menu]);
    useEffect(() => { localStorage.setItem('bloom_orders', JSON.stringify(orders)); }, [orders]);

    const showMsg = (text) => { setMsg(text); setTimeout(() => setMsg(null), 2500); };

    const getName = (item) => lang==='zh'?item.name_zh:lang==='en'?item.name_en:item.name_es;
    const getDesc = (item) => lang==='zh'?item.desc_zh:lang==='en'?item.desc_en:item.desc_es;

    const addToCart = (item) => {
        const exist = cart.find(i => i.id === item.id);
        if(exist) setCart(cart.map(i => i.id===item.id ? {...i, quantity:i.quantity+1} : i));
        else setCart([...cart, {...item, quantity:1}]);
        showMsg(`+1 ${getName(item)}`);
    };

    const total = cart.reduce((s,i)=> s + i.price*i.quantity, 0);

    const submitOrder = () => {
        if(cart.length===0) return;
        const newOrder = { id: Date.now().toString(), code: '#'+Math.floor(1000+Math.random()*9000), items: [...cart], total: total, status: '已下单', time: Date.now() };
        setOrders([newOrder, ...orders]);
        setCurrentOrderId(newOrder.id);
        setCart([]);
        setTab('orders');
        showMsg('✅ 下单成功！');
    };

    const updateStatus = (id, status) => {
        setOrders(orders.map(o => o.id===id ? {...o, status} : o));
        showMsg('状态已更新');
    };

    const deleteDish = (item) => {
        if(confirm(t.confirmDel)) { setMenu(menu.filter(m => m.id !== item.id)); showMsg(t.success); }
    };

    const saveDish = (e) => {
        e.preventDefault();
        if(!form.name_zh || !form.name_en || !form.name_es || !form.price) { showMsg('请填写完整'); return; }
        const newItem = {
            id: editing ? editing.id : Date.now().toString(),
            name_zh: form.name_zh, name_en: form.name_en, name_es: form.name_es,
            price: parseFloat(form.price), category: form.category,
            desc_zh: form.desc_zh || '美味', desc_en: form.desc_en || 'Delicious', desc_es: form.desc_es || 'Delicioso',
            img: form.img || TEMPLATES[0]
        };
        if(editing) setMenu(menu.map(m => m.id===editing.id ? newItem : m));
        else setMenu([...menu, newItem]);
        setForm({ name_zh:'', name_en:'', name_es:'', price:'', category:'饭类', desc_zh:'', desc_en:'', desc_es:'', img:'' });
        setEditing(null);
        showMsg(t.success);
    };

    const uploadImage = (e) => {
        const file = e.target.files[0];
        if(file && file.size < 2.5*1024*1024) {
            const reader = new FileReader();
            reader.onload = ev => setForm({...form, img: ev.target.result});
            reader.readAsDataURL(file);
        } else showMsg('图片太大，限2.5MB');
        e.target.value = '';
    };

    const categories = ['全部', '饭类', '面类', '寿司', '亚洲小吃', '甜点', '饮品'];
    const catMap = { '全部':t.all, '饭类':t.rice, '面类':t.noodles, '寿司':t.sushi, '亚洲小吃':t.snacks, '甜点':t.desserts, '饮品':t.drinks };
    const filtered = category==='全部' ? menu : menu.filter(m => m.category===category);

    return (
        <div className="min-h-screen bg-[#fcf9f5] pb-24">
            {msg && <div className="fixed top-5 left-1/2 -translate-x-1/2 bg-[#8c7355] text-white px-5 py-2 rounded-full text-sm z-50 shadow-lg">{msg}</div>}
            
            <header className="sticky top-0 bg-white/95 backdrop-blur border-b px-4 py-3 flex justify-between items-center max-w-4xl mx-auto">
                <div className="flex items-center gap-2">
                    <span className="text-2xl font-bold text-[#8c7355]">BLOOM</span>
                    <span className="text-xs text-stone-400">绽里</span>
                </div>
                <div className="flex gap-2">
                    <div className="flex bg-stone-100 rounded-lg text-xs">
                        {['zh','en','es'].map(l => <button key={l} onClick={()=>setLang(l)} className={`px-2 py-1 rounded ${lang===l?'bg-[#8c7355] text-white':'text-stone-600'}`}>{l.toUpperCase()}</button>)}
                    </div>
                    <button onClick={()=>setTab(tab==='admin'?'menu':'admin')} className="text-xs border border-[#c5a880] px-3 py-1 rounded-lg text-[#8c7355]">{tab==='admin'?t.back:t.admin}</button>
                </div>
            </header>

            <main className="max-w-4xl mx-auto px-4 py-5">
            {tab === 'menu' && (
                    <>
                        <div className="bg-gradient-to-r from-[#b5967a] to-[#8c7355] text-white p-6 rounded-2xl mb-6">
                            <span className="bg-white/20 text-xs px-3 py-1 rounded-full">✨ 今日推荐</span>
                            <h2 className="text-2xl font-bold mt-2">BLOOM 绽里</h2>
                            <p className="text-sm opacity-90">匠心熬制，温暖每一餐</p>
                        </div>
                        
                        <div className="flex gap-2 overflow-x-auto pb-3 mb-4">
                            {categories.map(c => <button key={c} onClick={()=>setCategory(c)} className={`px-4 py-2 rounded-full text-xs font-bold whitespace-nowrap ${category===c ? 'bg-[#8c7355] text-white' : 'bg-white text-stone-600 border'}`}>{catMap[c]}</button>)}
                        </div>
                        
                        <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                            {filtered.map(item => (
                                <div key={item.id} className="bg-white rounded-2xl overflow-hidden shadow-sm flex h-32">
                                    <img src={item.img} className="w-28 h-full object-cover" onError={e=>e.target.src=TEMPLATES[0]} />
                                    <div className="p-3 flex-1 flex flex-col justify-between">
                                        <div>
                                            <div className="flex justify-between"><h3 className="font-bold text-sm">{getName(item)}</h3><span className="text-[10px] bg-amber-50 px-2 rounded-full">{catMap[item.category]}</span></div>
                                            <p className="text-[11px] text-stone-500 mt-1 line-clamp-2">{getDesc(item)}</p>
                                        </div>
                                        <div className="flex justify-between items-center"><span className="font-bold text-[#8c7355]">${item.price.toFixed(2)}</span><button onClick={()=>addToCart(item)} className="bg-[#8c7355] text-white px-3 py-1 rounded-lg text-xs font-bold">+ {t.add}</button></div>
                                    </div>
                                </div>
                            ))}
                        </div>
                        {filtered.length===0 && <div className="text-center py-20 text-stone-400">{t.noOrders}</div>}
                    </>
                )}

                {tab === 'orders' && (
                    <>
                        <h2 className="text-xl font-bold mb-4">{t.orders}</h2>
                        {currentOrderId ? (() => {
                            const order = orders.find(o => o.id === currentOrderId);
                            if(!order) return <div className="text-center py-10">Loading...</div>;
                            const statuses = ['已下单', '制作中', '已送达'];
                            const statusText = { '已下单':t.ordered, '制作中':t.cooking, '已送达':t.delivered };
                            const idx = statuses.indexOf(order.status);
                            return (
                                <div className="bg-white p-5 rounded-2xl shadow-sm space-y-4">
                                    <div className="flex justify-between"><span className="font-bold">📋 {order.code}</span><span className="bg-[#8c7355] text-white px-3 py-1 rounded-full text-xs">{statusText[order.status]}</span></div>
                                    <div className="flex justify-between px-2">{statuses.map((s,i)=><div key={s} className="text-center"><div className={`w-8 h-8 rounded-full flex items-center justify-center text-xs ${i<=idx?'bg-[#8c7355] text-white':'bg-stone-100'}`}>{i+1}</div><span className="text-[10px]">{statusText[s]}</span></div>)}</div>
                                    <div className="border-t pt-3 space-y-2">{order.items.map(i=><div key={i.id} className="flex justify-between text-sm"><span>{getName(i)} x{i.quantity}</span><span>${(i.price*i.quantity).toFixed(2)}</span></div>)}<div className="flex justify-between font-bold border-t pt-2"><span>{t.total}</span><span>${order.total.toFixed(2)}</span></div></div>
                                </div>
                            );
                        })() : <div className="bg-white rounded-2xl p-10 text-center text-stone-400">{t.noOrders}<button onClick={()=>setTab('menu')} className="block mx-auto mt-4 bg-[#8c7355] text-white px-6 py-2 rounded-full text-sm">{t.menu}</button></div>}
                    </>
                )}

                {tab === 'admin' && !admin && (
                    <div className="max-w-sm mx-auto bg-white p-6 rounded-2xl shadow-sm">
                        <h3 className="text-center font-bold mb-4">🔐 {t.admin}</h3>
                        <form onSubmit={(e)=>{e.preventDefault(); if(pwd==='761025'){setAdmin(true);setPwdErr('');}else setPwdErr(t.wrong);}}>
                            <input type="password" placeholder={t.password} value={pwd} onChange={e=>setPwd(e.target.value)} className="w-full border rounded-xl p-3 mb-3 text-center" />
                            {pwdErr && <p className="text-red-500 text-xs text-center mb-2">{pwdErr}</p>}
                            <button type="submit" className="w-full bg-[#8c7355] text-white py-2 rounded-xl">{t.unlock}</button>
                        </form>
                    </div>
                )}

                {tab === 'admin' && admin && (
                    <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                        <div className="bg-white p-5 rounded-2xl shadow-sm">
                            <h3 className="font-bold mb-3">{editing ? t.editDish : t.addDish}</h3>
                            <form onSubmit={saveDish} className="space-y-3 text-sm">
                                <input type="text" placeholder={t.nameZh} value={form.name_zh} onChange={e=>setForm({...form,name_zh:e.target.value})} className="w-full border rounded-lg p-2" required />
                                <input type="text" placeholder={t.nameEn} value={form.name_en} onChange={e=>setForm({...form,name_en:e.target.value})} className="w-full border rounded-lg p-2" required />
                                <input type="text" placeholder={t.nameEs} value={form.name_es} onChange={e=>setForm({...form,name_es:e.target.value})} className="w-full border rounded-lg p-2" required />
                                <div className="flex gap-2"><input type="number" step="0.01" placeholder={t.price} value={form.price} onChange={e=>setForm({...form,price:e.target.value})} className="w-1/2 border rounded-lg p-2" required /><select value={form.category} onChange={e=>setForm({...form,category:e.target.value})} className="w-1/2 border rounded-lg p-2"><option>饭类</option><option>面类</option><option>寿司</option><option>亚洲小吃</option><option>甜点</option><option>饮品</option></select></div>
                                <textarea placeholder={t.nameZh+'描述'} value={form.desc_zh} onChange={e=>setForm({...form,desc_zh:e.target.value})} className="w-full border rounded-lg p-2 text-xs" rows="1" />
                                <div className="border-dashed border-2 p-2 text-center text-xs relative"><input type="file" accept="image/*" onChange={uploadImage} className="absolute inset-0 opacity-0 cursor-pointer" /><span>{t.upload}</span></div>
                                <div className="flex gap-1">{TEMPLATES.map((url,i)=><img key={i} src={url} className="w-10 h-10 object-cover rounded cursor-pointer border-2 border-transparent hover:border-[#8c7355]" onClick={()=>setForm({...form,img:url})} />)}</div>
                                {form.img && <img src={form.img} className="w-16 h-16 object-cover rounded mx-auto" />}
                                <button type="submit" className="w-full bg-[#8c7355] text-white py-2 rounded-lg">{editing ? t.editDish : t.addDish}</button>
                                {editing && <button type="button" onClick={()=>{setEditing(null);setForm({name_zh:'',name_en:'',name_es:'',price:'',category:'饭类',desc_zh:'',desc_en:'',desc_es:'',img:''});}} className="w-full border py-2 rounded-lg text-stone-500">取消</button>}
                            </form>
                        </div>
                        
                        <div className="lg:col-span-2 space-y-5">
                            <div className="bg-white p-5 rounded-2xl shadow-sm">
                                <h3 className="font-bold mb-3">📦 {t.orders}</h3>
                                <div className="space-y-3 max-h-96 overflow-y-auto">
                                    {orders.map(o => <div key={o.id} className="border-b pb-3"><div className="flex justify-between"><span className="font-bold text-sm">{o.code}</span><span className="text-xs text-stone-500">{new Date(o.time).toLocaleTimeString()}</span></div><div className="text-xs text-stone-600 mt-1">{o.items.map(i=>getName(i)).join(', ')}</div><div className="flex justify-between items-center mt-2"><span className="font-bold">${o.total.toFixed(2)}</span><div>{o.status==='已下单'&&<button onClick={()=>updateStatus(o.id,'制作中')} className="bg-[#8c7355] text-white px-3 py-1 rounded text-xs mr-2">🍳 {t.cooking}</button>}{o.status==='制作中'&&<button onClick={()=>updateStatus(o.id,'已送达')} className="bg-green-600 text-white px-3 py-1 rounded text-xs">✅ {t.delivered}</button>}</div></div></div>)}
                                    {orders.length===0 && <div className="text-center text-stone-400 py-5">{t.noOrders}</div>}
                                </div>
                            </div>
                            <div className="bg-white p-5 rounded-2xl shadow-sm">
                                <h3 className="font-bold mb-3">🍽️ {t.menu}</h3>
                                <div className="divide-y">
                                    {menu.map(m => <div key={m.id} className="py-2 flex justify-between items-center"><div className="flex items-center gap-3"><img src={m.img} className="w-10 h-10 object-cover rounded" /><span className="text-sm">{getName(m)}</span><span className="text-xs text-stone-400">${m.price}</span></div><div><button onClick={()=>{setEditing(m);setForm({name_zh:m.name_zh,name_en:m.name_en,name_es:m.name_es,price:m.price.toString(),category:m.category,desc_zh:m.desc_zh||'',desc_en:m.desc_en||'',desc_es:m.desc_es||'',img:m.img});}} className="text-blue-500 text-xs mr-3">✏️</button><button onClick={()=>deleteDish(m)} className="text-red-400 text-xs">🗑️</button></div></div>)}
                                </div>
                            </div>
                        </div>
                    </div>
                )}
            </main>

            {tab === 'menu' && cart.length > 0 && (
                <div className="fixed bottom-0 left-0 right-0 bg-white border-t shadow-lg p-3 flex justify-between items-center max-w-4xl mx-auto">
                    <div><span className="font-bold text-lg">${total.toFixed(2)}</span><span className="text-xs text-stone-400 ml-2">{cart.reduce((s,i)=>s+i.quantity,0)}件</span></div>
                    <button onClick={submitOrder} className="bg-[#8c7355] text-white px-6 py-2 rounded-full font-bold">{t.checkout}</button>
                </div>
            )}
            
            {tab !== 'admin' && (
                <div className="fixed bottom-0 left-0 right-0 bg-white border-t flex justify-around py-2 max-w-4xl mx-auto">
                    <button onClick={()=>setTab('menu')} className={`flex flex-col items-center text-xs ${tab==='menu'?'text-[#8c7355]':'text-stone-400'}`}>🍽️ {t.menu}</button>
                    <button onClick={()=>setTab('orders')} className={`flex flex-col items-center text-xs ${tab==='orders'?'text-[#8c7355]':'text-stone-400'}`}>📋 {t.orders}</button>
                </div>
            )}
        </div>
    );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
